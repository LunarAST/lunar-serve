name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lunar-serve
        uses: actions/checkout@v5
        with:
          path: lunar-serve

      - name: Checkout lunar-interface
        uses: actions/checkout@v5
        with:
          repository: LunarAST/lunar-interface
          path: lunar-interface

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release binary
        run: cargo build --release
        working-directory: lunar-serve

      - name: Generate SHA256 checksums
        run: sha256sum target/release/lunar-serve > checksums.txt
        working-directory: lunar-serve

      - name: Upload binary and checksums to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            lunar-serve/target/release/lunar-serve
            lunar-serve/checksums.txt
